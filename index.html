<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LDB Apps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Libre+Baskerville:ital,wght@0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ui/tokens.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--t-ink);
      color: var(--t-text-inv);
      font-family: var(--t-mono), monospace;
    }
    .panel {
      width: min(720px, 92vw);
      background: var(--t-ink-2);
      border: 1px solid var(--t-ink-border);
      border-radius: 10px;
      padding: 32px;
    }
    h1 {
      margin: 0 0 6px 0;
      color: var(--t-accent);
      font-family: var(--t-serif), serif;
      font-style: italic;
      font-size: 28px;
    }
    p {
      margin: 0 0 20px 0;
      font-size: 13px;
      color: var(--t-text-inv-dim);
    }
    .links {
      display: grid;
      gap: 10px;
    }
    a {
      display: block;
      text-decoration: none;
      color: var(--t-text-inv);
      border: 1px solid var(--t-ink-border);
      border-radius: 6px;
      padding: 13px 16px;
      background: var(--t-ink);
      font-family: var(--t-mono), monospace;
      font-size: 13px;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    a:hover {
      border-color: var(--t-accent);
      background: rgba(194,57,10,0.08);
    }
    .hint {
      margin-top: 16px;
      font-size: 11px;
      color: var(--t-text-inv-muted);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Lucid Dream Baseball Apps</h1>
    <p>Select a view.</p>
    <div class="links">
      <a href="/ui-league/index.html">League View (public facing)</a>
      <a href="/ui/index.html">GM View (private tools)</a>
    </div>
    <div class="hint">Served from repository root on port 8080.</div>
  </main>
</body>
</html>
